name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag_name }}".Trim()
          } else {
            $tag = "${{ github.ref_name }}".Trim()
          }

          if (-not ($tag -match '^v.+')) {
            throw "Release tag must start with v. Current value: $tag"
          }

          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        shell: pwsh
        run: |
          python -m compileall main.py gui.py image_processor.py compressor.py logo_manager.py file_utils.py config.py

      - name: Build executable
        shell: cmd
        run: build.bat

      - name: Verify executable
        shell: pwsh
        run: |
          $exe = "dist\图片处理工具.exe"
          if (-not (Test-Path $exe)) {
            throw "Executable not found: $exe"
          }

          $item = Get-Item $exe
          if ($item.Length -le 0) {
            throw "Executable is empty: $exe"
          }

          Write-Host "Executable size: $([math]::Round($item.Length / 1MB, 2)) MB"

      - name: Create release package
        shell: pwsh
        run: |
          $tag = "${{ steps.release_tag.outputs.tag }}"
          $packageDir = "release-package"
          $zipPath = "图片处理工具-$tag-windows.zip"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item "dist\图片处理工具.exe" "$packageDir\图片处理工具.exe"
          Copy-Item "README.md" "$packageDir\README.md"
          Compress-Archive -Path "$packageDir\*" -DestinationPath $zipPath -Force

          if (-not (Test-Path $zipPath)) {
            throw "Release package not found: $zipPath"
          }

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: 图片处理工具 ${{ steps.release_tag.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/图片处理工具.exe
            图片处理工具-${{ steps.release_tag.outputs.tag }}-windows.zip
